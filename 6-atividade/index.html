<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <div class="container">
        <div style="text-align:center;">
    <svg width="150" height="150" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo -->
  <circle cx="50" cy="50" r="45" fill="#2E86DE"/>

  <!-- Ícone de relógio -->
  <circle cx="50" cy="50" r="25" fill="#ffffff"/>
  <line x1="50" y1="50" x2="50" y2="35" stroke="#2E86DE" stroke-width="3"/>
  <line x1="50" y1="50" x2="65" y2="50" stroke="#2E86DE" stroke-width="3"/>

  <!-- Documento -->
  <rect x="30" y="65" width="40" height="20" rx="3" fill="#27AE60"/>
  <line x1="35" y1="72" x2="65" y2="72" stroke="#ffffff" stroke-width="2"/>
  <line x1="35" y1="78" x2="55" y2="78" stroke="#ffffff" stroke-width="2"/>
</svg>
</div>
        <h1>Cálculo de Aposentadoria</h1>

        <label for="numeroInput">Digite sua matrícula: </label>
        <input type="number" id="numeroInput" placeholder="">

        <label for="numeroInput2">Digite o ano do seu nascimento: </label>
        <input type="number" id="numeroInput2" placeholder="">

        <label for="numeroInput3">Digite o tempo trabalhado: </label>
        <input type="number" id="numeroInput3" placeholder="EM ANOS...">


        <button id="btnResultado">Calcular Aposentadoria</button>

        <div id="resultadoBeneficio"></div>
    </div>
    
    <script src="script.js"></script>
